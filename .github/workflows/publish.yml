name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # required for OIDC Trusted Publisher + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish  # must match the Trusted Publisher environment name

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify package version matches release tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ package.json version ($PKG_VERSION) != release tag ($TAG_VERSION)"
            exit 1
          fi
          echo "✅ Version matches: $PKG_VERSION"

      - name: Publish with provenance (OIDC Trusted Publisher)
        # NODE_AUTH_TOKEN is intentionally empty — this causes npm to fall
        # through to OIDC Trusted Publisher authentication using the GitHub
        # ID token (id-token: write permission above).
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ""
