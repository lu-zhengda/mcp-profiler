name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # required to request GitHub OIDC token for npm Trusted Publisher

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish  # must match the Trusted Publisher environment name

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify package version matches release tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ package.json version ($PKG_VERSION) != release tag ($TAG_VERSION)"
            exit 1
          fi
          echo "✅ Version matches: $PKG_VERSION"

      - name: Debug npm + OIDC environment
        run: |
          echo "npm version: $(npm --version)"
          echo "node version: $(node --version)"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL set: $([[ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]] && echo yes || echo no)"

      - name: Get OIDC token for npm Trusted Publisher
        id: oidc
        run: |
          TOKEN=$(curl -fsSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npmjs" | jq -r '.value')
          # Show token type (first 20 chars safe to log)
          echo "Token obtained, length: ${#TOKEN}, prefix: ${TOKEN:0:20}..."
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Publish with provenance
        run: npm publish --access public --provenance --loglevel=verbose 2>&1 | tail -40
        env:
          NODE_AUTH_TOKEN: ${{ steps.oidc.outputs.token }}
