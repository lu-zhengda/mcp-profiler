name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # required for OIDC Trusted Publisher + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish  # must match the Trusted Publisher environment name

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # No registry-url here — setup-node would write an _authToken into
          # .npmrc which takes precedence over OIDC Trusted Publisher auth.

      - name: Configure npm registry (no token)
        run: npm config set registry https://registry.npmjs.org

      - name: Verify package version matches release tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ package.json version ($PKG_VERSION) != release tag ($TAG_VERSION)"
            exit 1
          fi
          echo "✅ Version matches: $PKG_VERSION"

      - name: Publish with provenance (OIDC Trusted Publisher)
        # --provenance exchanges the GitHub OIDC token with npm for auth.
        # No NPM_TOKEN secret is needed when Trusted Publisher is configured.
        run: npm publish --access public --provenance
